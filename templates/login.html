<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TelaCheia</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --card: #16161f;
      --accent: #c084fc;
      --accent2: #a855f7;
      --text: #f5f5f5;
      --muted: #6b6a72;
      --border: rgba(192, 132, 252, 0.12);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    /* Glow de fundo */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Header */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-decoration: none;
    }

    .logo span { color: var(--accent2); }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }

    .back-btn:hover { color: var(--accent); }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
      position: relative;
      z-index: 1;
    }

    /* Card */
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      animation: fadeUp 0.5s ease both;
    }

    .card-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 0.04em;
      color: var(--text);
      margin-bottom: 0.25rem;
      line-height: 1;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      margin-bottom: 2rem;
      margin-top: 0.75rem;
    }

    /* Form */
    .input-group {
      margin-bottom: 1rem;
    }

    .input-group label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .input-group input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-group input::placeholder { color: var(--muted); }

    .input-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(192, 132, 252, 0.08);
    }

    .submit-btn {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #0a0a0f;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s, box-shadow 0.2s;
      letter-spacing: 0.02em;
    }

    .submit-btn:hover {
      background: #d8a4ff;
      box-shadow: 0 0 20px rgba(192, 132, 252, 0.4);
    }

    .card-footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .card-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: text-shadow 0.2s;
    }

    .card-footer a:hover {
      text-shadow: 0 0 10px rgba(192, 132, 252, 0.8);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      opacity: 0.5;
    }

    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="/" class="logo">Tela<span>Cheia🍿</span></a>
      <a href="/" class="back-btn">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Voltar
      </a>
    </div>
  </header>

  <div class="main">
    <div class="login-card">
      <p class="card-label">Bem-vindo de volta</p>
      <h1 class="card-title">Login</h1>
      <div class="divider"></div>

      <form action="/login" method="post">
        <div class="input-group">
          <label for="nome">Usuário</label>
          <input type="text" id="nome" name="nome" placeholder="Seu nome de usuário" required autocomplete="off"/>
        </div>
        <div class="input-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="Sua senha" required/>
        </div>
        <button class="submit-btn" type="submit">Entrar</button>
      </form>

      <div class="card-footer">
        Não tem conta? <a href="/cadastro">Criar conta</a>
      </div>
    </div>
  </div>

  <footer>
    A vida é boa quando exploramos outros mundos! &nbsp;|&nbsp;
    <a href="https://www.themoviedb.org" target="_blank">Dados por TMDB</a>
  </footer>

</body>
</html>
